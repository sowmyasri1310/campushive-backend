# ── Server ──────────────────────────────────────────
server.port=8080

# ── MySQL Database ───────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/campus_booking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────────────────
jwt.secret=campus_booking_super_secret_key_2024_do_not_share
jwt.expiration=86400000

# ── Disable Spring Security default login page ───────
spring.security.user.name=disabled
spring.security.user.password=disabled